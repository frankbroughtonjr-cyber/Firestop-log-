<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penetration Log — UPMC Presbyterian</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase v10 module — loads before anything else -->
<script type="module">
  import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app = initializeApp({ databaseURL: "https://firestop-log-default-rtdb.firebaseio.com" });
  window._db  = getDatabase(app);
  window._fdb = { ref, set, onValue, remove };
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root {
  --red:#CC2200; --dark:#111; --panel:#1C1C1C; --panel2:#222;
  --border:#2E2E2E; --border2:#3A3A3A; --muted:#555; --text:#CCC;
  --bright:#F0EDE8; --yellow:#F0A500; --green:#2A7A3A; --gl:#3DAA52;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:13px;min-height:100vh;}

/* SYNC BAR */
.sync-bar{background:#0A0A0A;border-bottom:1px solid var(--border);padding:5px 20px;display:flex;align-items:center;gap:8px;font-family:'Source Code Pro',monospace;font-size:0.62rem;letter-spacing:0.1em;}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background 0.3s;}
.sync-dot.connected{background:#3DAA52;box-shadow:0 0 5px #3DAA52;}
.sync-dot.syncing{background:var(--yellow);}
.sync-dot.error{background:var(--red);}
.sync-dot.offline{background:var(--muted);}
.sync-label{color:var(--muted);}
.sync-time{margin-left:auto;color:#333;}

/* HEADER */
.header{background:var(--red);padding:16px 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-eyebrow{font-family:'Source Code Pro',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:3px;}
.header-title{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1;}
.header-meta{font-size:0.78rem;color:rgba(255,255,255,0.7);margin-top:5px;display:flex;gap:16px;flex-wrap:wrap;}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hdr-btn{font-family:'Oswald',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:8px 14px;cursor:pointer;border:none;transition:opacity 0.15s;white-space:nowrap;}
.hdr-btn.primary{background:#000;color:var(--yellow);}
.hdr-btn.secondary{background:rgba(0,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,0.3);}
.hdr-btn:hover{opacity:0.8;}

/* DATE BAR */
.datebar{background:#0A0A0A;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.datebar label{font-family:'Source Code Pro',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.datebar input{background:var(--panel);border:1px solid var(--border2);color:var(--bright);font-family:'Source Code Pro',monospace;font-size:0.8rem;padding:5px 10px;outline:none;}
.datebar input:focus{border-color:var(--red);}
.datebar-sep{color:var(--border2);}

.main{padding:16px 20px;}

/* TABS */
.installer-bar{display:flex;flex-wrap:wrap;border-bottom:2px solid var(--border);margin-bottom:2px;}
.inst-tab{font-family:'Oswald',sans-serif;font-size:0.72rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:9px 14px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;}
.inst-tab:hover{color:var(--text);}
.inst-tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.inst-tab.has-data::after{content:'●';font-size:0.4rem;color:var(--gl);margin-left:5px;vertical-align:middle;}
.inst-panel{display:none;}
.inst-panel.active{display:block;}

/* NAME ROW */
.inst-name-row{background:var(--panel2);padding:10px 14px;display:flex;align-items:center;gap:14px;margin-bottom:2px;border-left:3px solid var(--yellow);}
.inst-name-row label{font-family:'Source Code Pro',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.inst-name-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--bright);font-family:'Oswald',sans-serif;font-size:1rem;font-weight:500;letter-spacing:0.06em;padding:2px 6px;outline:none;width:220px;}
.inst-name-input:focus{border-bottom-color:var(--yellow);}

/* TABLE */
.log-wrap{overflow-x:auto;margin-bottom:2px;}
.log-table{width:100%;border-collapse:collapse;min-width:820px;}
.log-table th{background:#0D0D0D;font-family:'Source Code Pro',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
.log-table td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle;}
.log-table tr:hover td{background:rgba(255,255,255,0.02);}
.row-num{font-family:'Source Code Pro',monospace;font-size:0.65rem;color:var(--muted);text-align:center;}
.log-table select,.log-table input{background:transparent;border:1px solid transparent;color:var(--bright);font-family:'Source Sans 3',sans-serif;font-size:0.8rem;padding:4px 6px;width:100%;outline:none;transition:border 0.1s;}
.log-table select:focus,.log-table input:focus{border-color:var(--border2);background:var(--panel);}
.log-table select{cursor:pointer;-webkit-appearance:none;}
input[type=number]{text-align:center;}

/* ROW COLORS */
.type-sns-wall {border-left:3px solid #4A90E2 !important;}
.type-lci-wall {border-left:3px solid var(--red) !important;}
.type-blank-sns{border-left:3px solid #27AE60 !important;}
.type-blank-lci{border-left:3px solid #F39C12 !important;}
.type-jbox     {border-left:3px solid #9B59B6 !important;}
.type-annular  {border-left:3px solid #E74C3C !important;}

.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;padding:3px 8px;transition:color 0.1s;}
.del-btn:hover{color:var(--red);}
.add-row-btn{width:100%;background:var(--panel);border:1px dashed var(--border2);color:var(--muted);font-family:'Oswald',sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:8px;cursor:pointer;transition:all 0.15s;margin-bottom:12px;}
.add-row-btn:hover{color:var(--yellow);border-color:var(--yellow);background:rgba(240,165,0,0.05);}

/* TOTALS */
.totals-section{background:var(--panel2);border-top:2px solid var(--border2);padding:14px 16px;margin-bottom:12px;}
.totals-title{font-family:'Oswald',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.totals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:6px;}
.total-item{background:var(--panel);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.total-label{font-size:0.75rem;color:var(--text);line-height:1.3;}
.total-val{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;flex-shrink:0;}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:12px;}
.sum-card{background:var(--panel2);padding:14px 16px;}
.sum-card-title{font-family:'Oswald',sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dotted var(--border);font-size:0.8rem;}
.sum-row:last-child{border-bottom:none;}
.sum-row-val{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:var(--yellow);}
.sum-row-val.zero{color:var(--muted);font-size:0.85rem;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Source Code Pro',monospace;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}

@media print{
  .sync-bar,.hdr-btn,.add-row-btn,.del-btn,.datebar,.loading-overlay{display:none;}
  body{background:white;color:black;}
  .log-table th{background:#eee !important;color:#333 !important;-webkit-print-color-adjust:exact;}
  .inst-panel{display:block !important;page-break-after:always;}
  .inst-tab,.installer-bar{display:none;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to database...</div>
</div>

<div class="sync-bar">
  <div class="sync-dot offline" id="sync-dot"></div>
  <span class="sync-label" id="sync-label">Connecting...</span>
  <span class="sync-time" id="sync-time"></span>
</div>

<div class="header">
  <div>
    <div class="header-eyebrow">KIM Industries · Firestop Division · Daily Penetration Log</div>
    <div class="header-title">UPMC PRESBYTERIAN</div>
    <div class="header-meta"><span>Job #5063</span><span>Pittsburgh, PA</span><span>Carpenters Union</span></div>
  </div>
  <div class="header-right">
    <button class="hdr-btn secondary" onclick="showSummary()">📊 Daily Summary</button>
    <button class="hdr-btn secondary" onclick="clearDay()">🗑 Clear Day</button>
    <button class="hdr-btn primary" onclick="window.print()">🖨 Print / PDF</button>
  </div>
</div>

<div class="datebar">
  <label>Date</label>
  <input type="date" id="log-date">
  <span class="datebar-sep">|</span>
  <label>Superintendent</label>
  <input type="text" id="super-name" placeholder="Your name" style="width:170px" oninput="saveMeta()">
  <span class="datebar-sep">|</span>
  <label>Shift</label>
  <input type="text" id="shift-name" placeholder="Day / Night" style="width:110px" oninput="saveMeta()">
</div>

<div class="main">
  <div class="installer-bar" id="installer-bar"></div>
  <div id="installer-panels"></div>
  <div id="summary-panel" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--bright)">Daily Summary — All Installers</div>
      <button class="hdr-btn secondary" onclick="hideSummary()" style="font-size:0.68rem;padding:6px 12px;">← Back</button>
    </div>
    <div class="summary-grid" id="summary-content"></div>
    <div style="background:var(--panel2);padding:14px 16px;border-top:2px solid var(--yellow)">
      <div class="sum-card-title" style="color:var(--yellow)">JOB TOTALS — ALL INSTALLERS TODAY</div>
      <div class="totals-grid" id="job-totals-grid"></div>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────
const INSTALLERS = 10;
const ITEM_TYPES = [
  { key:'sns-wall',  label:'SNS Wall Penetration',           color:'#4A90E2' },
  { key:'lci-wall',  label:'LCI Wall Penetration (F-Rated)', color:'#CC2200' },
  { key:'blank-sns', label:'Blank Wall Pen — SNS',           color:'#27AE60' },
  { key:'blank-lci', label:'Blank Wall Pen — LCI',           color:'#F39C12' },
  { key:'jbox',      label:'Extruded J-Box',                 color:'#9B59B6' },
  { key:'annular',   label:'Oversized Annular Space',        color:'#E74C3C' },
];

// ── STATE ─────────────────────────────────────────────────────
const state = {
  rows:  Array.from({length:INSTALLERS}, ()=>[]),
  names: Array.from({length:INSTALLERS}, (_,i)=>`Installer ${i+1}`),
  activeTab: 0,
};

const TODAY = new Date().toISOString().split('T')[0];
let saveTimer, isSaving=false, unsubscribe=null;

// ── SYNC STATUS ───────────────────────────────────────────────
function setSyncStatus(status, msg) {
  document.getElementById('sync-dot').className = `sync-dot ${status}`;
  document.getElementById('sync-label').textContent = msg;
  if (status==='connected') document.getElementById('sync-time').textContent = 'Last sync: '+new Date().toLocaleTimeString();
}

// ── FIREBASE HELPERS ──────────────────────────────────────────
function getPath() { return `upmc-5063/${document.getElementById('log-date').value||TODAY}`; }

function saveToFirebase() {
  if (!window._db || isSaving) return;
  isSaving = true;
  setSyncStatus('syncing','Saving...');
  const {ref,set} = window._fdb;
  set(ref(window._db, getPath()), {
    names: state.names,
    rows:  state.rows,
    meta:  {
      super:   document.getElementById('super-name').value,
      shift:   document.getElementById('shift-name').value,
      date:    document.getElementById('log-date').value,
      updated: new Date().toISOString()
    }
  }).then(()=>{ setSyncStatus('connected','Saved ✓'); isSaving=false; })
    .catch(e=>{ setSyncStatus('error','Save failed'); isSaving=false; console.error(e); });
}

function debounceSave() { clearTimeout(saveTimer); saveTimer=setTimeout(saveToFirebase,800); }
function saveMeta() { debounceSave(); }

function loadDate() {
  if (!window._db) return;
  setSyncStatus('syncing','Loading...');
  if (unsubscribe) { unsubscribe(); unsubscribe=null; }
  const {ref,onValue} = window._fdb;
  unsubscribe = onValue(ref(window._db, getPath()), snap => {
    const data = snap.val();
    if (data) {
      state.names = data.names || Array.from({length:INSTALLERS},(_,i)=>`Installer ${i+1}`);
      state.rows  = data.rows  || Array.from({length:INSTALLERS},()=>[]);
      while (state.names.length<INSTALLERS) state.names.push(`Installer ${state.names.length+1}`);
      while (state.rows.length <INSTALLERS) state.rows.push([]);
      if (data.meta) {
        if (data.meta.super) document.getElementById('super-name').value=data.meta.super;
        if (data.meta.shift) document.getElementById('shift-name').value=data.meta.shift;
      }
    } else {
      state.names=Array.from({length:INSTALLERS},(_,i)=>`Installer ${i+1}`);
      state.rows =Array.from({length:INSTALLERS},()=>[]);
    }
    renderAllPanels(); renderTabs();
    setSyncStatus('connected','Live sync active ✓');
  }, err=>{ setSyncStatus('error','Connection error — check Firebase rules'); console.error(err); });
}

// ── START AFTER FIREBASE READY ────────────────────────────────
function startApp() {
  document.getElementById('log-date').value = TODAY;
  document.getElementById('log-date').addEventListener('change', loadDate);
  loadDate();
}

// Render UI immediately so page isn't blank on mobile
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('log-date').value = TODAY;
  renderAllPanels();
  renderTabs();
});

document.addEventListener('firebase-ready', startApp);

// Fallback if firebase-ready misfires
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    if (window._db && window._fdb && !document.getElementById('log-date').value) {
      startApp();
    } else if (!window._db) {
      setSyncStatus('error','Firebase failed to load');
    }
  }, 4000);
});

// ── TABS ──────────────────────────────────────────────────────
function renderTabs() {
  const bar=document.getElementById('installer-bar');
  bar.innerHTML='';
  for (let i=0;i<INSTALLERS;i++) {
    const btn=document.createElement('button');
    btn.className='inst-tab'+(i===state.activeTab?' active':'')+(state.rows[i]&&state.rows[i].length>0?' has-data':'');
    btn.textContent=state.names[i]||`Installer ${i+1}`;
    btn.onclick=()=>switchTab(i);
    bar.appendChild(btn);
  }
}

function switchTab(i) {
  state.activeTab=i;
  document.querySelectorAll('.inst-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.inst-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`panel-${i}`)?.classList.add('active');
  document.querySelectorAll('.inst-tab')[i]?.classList.add('active');
  document.getElementById('summary-panel').style.display='none';
  document.getElementById('installer-panels').style.display='';
}

// ── PANELS ────────────────────────────────────────────────────
function renderAllPanels() {
  const c=document.getElementById('installer-panels');
  c.innerHTML='';
  for (let i=0;i<INSTALLERS;i++) c.appendChild(buildPanel(i));
  switchTab(state.activeTab);
}

function buildPanel(i) {
  const div=document.createElement('div');
  div.className='inst-panel'+(i===state.activeTab?' active':'');
  div.id=`panel-${i}`;
  div.innerHTML=`
    <div class="inst-name-row">
      <label>Installer Name</label>
      <input class="inst-name-input" type="text" value="${state.names[i]}" placeholder="Enter name" oninput="updateName(${i},this.value)">
      <span style="font-family:'Source Code Pro',monospace;font-size:0.6rem;color:var(--muted);margin-left:auto;letter-spacing:0.1em">INSTALLER ${i+1} OF ${INSTALLERS}</span>
    </div>`;
  const wrap=document.createElement('div');
  wrap.className='log-wrap';
  wrap.innerHTML=`
    <table class="log-table">
      <thead><tr>
        <th style="width:32px;text-align:center">#</th>
        <th style="min-width:205px">Item Type</th>
        <th style="width:65px;text-align:center">Qty (Pens)</th>
        <th style="min-width:150px">Floor / Zone / Room</th>
        <th style="min-width:90px;text-align:center">Mat Qty<br><span style="font-size:0.55rem;color:#444">(tubes/units)</span></th>
        <th style="min-width:150px">Notes</th>
        <th style="width:34px"></th>
      </tr></thead>
      <tbody id="tbody-${i}"></tbody>
    </table>`;
  div.appendChild(wrap);
  const addBtn=document.createElement('button');
  addBtn.className='add-row-btn';
  addBtn.textContent='+ Add Row';
  addBtn.onclick=()=>addRow(i);
  div.appendChild(addBtn);
  const totDiv=document.createElement('div');
  totDiv.className='totals-section';
  totDiv.id=`totals-${i}`;
  div.appendChild(totDiv);
  renderRows(i); renderTotals(i);
  return div;
}

// ── ROWS ──────────────────────────────────────────────────────
function addRow(idx) {
  if (!state.rows[idx]) state.rows[idx]=[];
  state.rows[idx].push({type:'',location:'',qty:'',matQty:'',notes:''});
  renderRows(idx); renderTotals(idx); renderTabs(); debounceSave();
  setTimeout(()=>document.getElementById(`tbody-${idx}`)?.lastElementChild?.querySelector('select')?.focus(),50);
}

function deleteRow(idx,ri) {
  state.rows[idx].splice(ri,1);
  renderRows(idx); renderTotals(idx); renderTabs(); debounceSave();
}

function updateRow(idx,ri,field,val) {
  state.rows[idx][ri][field]=val;
  if (field==='type') {
    const row=document.querySelector(`#tbody-${idx} tr:nth-child(${ri+1})`);
    if (row) { ITEM_TYPES.forEach(t=>row.classList.remove(`type-${t.key}`)); if(val) row.classList.add(`type-${val}`); }
  }
  renderTotals(idx); debounceSave();
}

function renderRows(idx) {
  const tbody=document.getElementById(`tbody-${idx}`);
  if (!tbody) return;
  tbody.innerHTML='';
  (state.rows[idx]||[]).forEach((r,ri)=>{
    const tr=document.createElement('tr');
    if (r.type) tr.classList.add(`type-${r.type}`);
    const opts=ITEM_TYPES.map(t=>`<option value="${t.key}"${r.type===t.key?' selected':''}>${t.label}</option>`).join('');
    tr.innerHTML=`
      <td class="row-num">${ri+1}</td>
      <td><select onchange="updateRow(${idx},${ri},'type',this.value)"><option value="">— Select type —</option>${opts}</select></td>
      <td><input type="number" min="0" value="${r.qty||''}" placeholder="0" oninput="updateRow(${idx},${ri},'qty',this.value)" style="width:56px;text-align:center"></td>
      <td><input type="text" value="${r.location||''}" placeholder="e.g. 4N / Rm 412" oninput="updateRow(${idx},${ri},'location',this.value)"></td>
      <td><input type="number" min="0" value="${r.matQty||''}" placeholder="0" oninput="updateRow(${idx},${ri},'matQty',this.value)" style="width:72px;text-align:center"></td>
      <td><input type="text" value="${r.notes||''}" placeholder="Notes..." oninput="updateRow(${idx},${ri},'notes',this.value)"></td>
      <td><button class="del-btn" onclick="deleteRow(${idx},${ri})">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

// ── TOTALS ────────────────────────────────────────────────────
function calcTotals(idx) {
  const t={};
  ITEM_TYPES.forEach(x=>{t[x.key]=0;t[x.key+'_mat']=0;});
  (state.rows[idx]||[]).forEach(r=>{ if(r.type){t[r.type]+=(parseInt(r.qty)||0);t[r.type+'_mat']+=(parseInt(r.matQty)||0);} });
  return t;
}

function renderTotals(idx) {
  const el=document.getElementById(`totals-${idx}`);
  if (!el) return;
  const t=calcTotals(idx);
  el.innerHTML=`<div class="totals-title">Installer Totals — ${state.names[idx]||`Installer ${idx+1}`}</div>
    <div class="totals-grid">${ITEM_TYPES.map(x=>`
      <div class="total-item" style="border-left:3px solid ${x.color}">
        <div class="total-label">${x.label}</div>
        <div style="text-align:right;flex-shrink:0">
          <div class="total-val" style="color:${t[x.key]>0?'var(--yellow)':'var(--muted)'}">${t[x.key]}<span style="font-size:0.5rem;color:var(--muted);margin-left:2px">pens</span></div>
          <div style="font-family:'Source Code Pro',monospace;font-size:0.68rem;color:${t[x.key+'_mat']>0?'#7AB8E0':'var(--muted)'};">${t[x.key+'_mat']}<span style="font-size:0.5rem;margin-left:2px">mat</span></div>
        </div>
      </div>`).join('')}</div>`;
}

function updateName(i,val) { state.names[i]=val||`Installer ${i+1}`; renderTabs(); renderTotals(i); debounceSave(); }

// ── SUMMARY ───────────────────────────────────────────────────
function showSummary() {
  document.getElementById('installer-panels').style.display='none';
  document.getElementById('summary-panel').style.display='block';
  const content=document.getElementById('summary-content');
  const jt={};
  ITEM_TYPES.forEach(x=>{jt[x.key]=0;jt[x.key+'_mat']=0;});
  content.innerHTML='';
  state.rows.forEach((rows,i)=>{
    if (!rows||!rows.length) return;
    const t=calcTotals(i);
    ITEM_TYPES.forEach(x=>{jt[x.key]+=t[x.key];jt[x.key+'_mat']+=t[x.key+'_mat'];});
    const card=document.createElement('div');
    card.className='sum-card';
    card.innerHTML=`<div class="sum-card-title">${state.names[i]||`Installer ${i+1}`} — ${rows.length} line${rows.length!==1?'s':''}</div>
      ${ITEM_TYPES.map(x=>`<div class="sum-row">
        <span style="border-left:2px solid ${x.color};padding-left:6px;color:var(--text)">${x.label}</span>
        <span style="display:flex;gap:10px;align-items:center">
          <span class="sum-row-val${t[x.key]===0?' zero':''}">${t[x.key]}<span style="font-size:0.5rem;color:var(--muted);margin-left:2px">pens</span></span>
          <span style="font-family:'Source Code Pro',monospace;font-size:0.72rem;color:${t[x.key+'_mat']>0?'#7AB8E0':'var(--muted)'};">${t[x.key+'_mat']}<span style="font-size:0.5rem;margin-left:2px">mat</span></span>
        </span></div>`).join('')}`;
    content.appendChild(card);
  });
  if (!content.children.length) content.innerHTML='<div style="color:var(--muted);padding:20px;font-size:0.85rem;">No entries logged yet.</div>';
  document.getElementById('job-totals-grid').innerHTML=ITEM_TYPES.map(x=>`
    <div class="total-item" style="border-left:3px solid ${x.color}">
      <div class="total-label">${x.label}</div>
      <div style="text-align:right;flex-shrink:0">
        <div class="total-val" style="color:${jt[x.key]>0?'var(--yellow)':'var(--muted)'}">${jt[x.key]}<span style="font-size:0.5rem;color:var(--muted);margin-left:2px">pens</span></div>
        <div style="font-family:'Source Code Pro',monospace;font-size:0.68rem;color:${jt[x.key+'_mat']>0?'#7AB8E0':'var(--muted)'};">${jt[x.key+'_mat']}<span style="font-size:0.5rem;margin-left:2px">mat</span></div>
      </div></div>`).join('');
}

function hideSummary() {
  document.getElementById('summary-panel').style.display='none';
  document.getElementById('installer-panels').style.display='';
  switchTab(state.activeTab);
}

// ── CLEAR ─────────────────────────────────────────────────────
function clearDay() {
  if (!confirm('Clear ALL entries for today? This deletes from the database and cannot be undone.')) return;
  state.rows =Array.from({length:INSTALLERS},()=>[]);
  state.names=Array.from({length:INSTALLERS},(_,i)=>`Installer ${i+1}`);
  const {ref,remove}=window._fdb;
  remove(ref(window._db, getPath()));
  renderAllPanels(); renderTabs();
}
</script>
</body>
</html>
